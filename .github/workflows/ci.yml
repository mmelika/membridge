name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Prod deps from the lockfile (tests exercise libsodium-wrappers), minus
      # devDependencies — electron/electron-builder are heavy and unused by the
      # suite. The MCP SDK + zod are deliberately opt-in (not in package.json),
      # but the MCP tests require them, so install them without saving.
      - run: npm ci --omit=dev --no-audit --no-fund
      - run: npm install --no-save --no-audit --no-fund @modelcontextprotocol/sdk@^1 zod@^4
      - run: node test/run-tests.js
